  /* ===== Theme A · Aerial Blue Rose Light ===== */

    color-scheme: light;

    --paper: #F8FCFF;

    --warn: #F59E0B;

    color-scheme: dark;
    --bg: #0D0F0E;
    --bg-deep: #171817;
    --paper: #1A1C1A;
    --paper-2: #22251F;
    --paper-3: #2D3028;
    --ink: #F3EEE3;
    --ink-soft: #C8C1B3;
    --ink-mute: #878477;
    --line: #35372F;
    --line-soft: #292C26;
    --accent: #C6A66A;
    --accent-soft: #E4D4AD;
    --accent-2: #6F8B6B;
    --accent-3: #9F7565;
    --warn: #C08A4A;
    --radius-lg: 14px;

  @media (prefers-reduced-motion: reduce) {

      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }

  .paper-noise::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background-image:

    background-size: 3px 3px;
    mix-blend-mode: multiply;
    opacity:.5;
