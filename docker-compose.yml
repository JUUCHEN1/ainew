# ============================================================
# 漫创AI Web · Docker Compose 编排
# ------------------------------------------------------------
# 服务：
#   backend  FastAPI 后端 (内部 8765，不直接对外)
#   nginx    反向代理 + 静态前端 + HTTPS 入口 (对外 80/443)
#
# 启动：  docker compose up -d --build
# 日志：  docker compose logs -f
# 停止：  docker compose down
# ============================================================
services:
  backend:
    build: .
    image: libai-web-backend:latest
    container_name: libai-backend
    restart: unless-stopped
    env_file:
      # 存储凭据 / 公网地址等。复制 .env.deploy.example 为 .env.deploy 后填写。
      - .env.deploy
    volumes:
      # 数据持久化：SQLite、参考图自托管目录、项目数据都在这里
      - ./data:/app/data
    expose:
      - "8765"
    # 仅本机回环暴露，方便在宿主机调试；对外一律走 nginx
    ports:
      - "127.0.0.1:8765:8765"

  nginx:
    image: nginx:1.27-alpine
    container_name: libai-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 站点配置（含 _libai_proxy.inc 公共头）
      - ./deploy/nginx/libai.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/_libai_proxy.inc:/etc/nginx/conf.d/_libai_proxy.inc:ro
      # 前端静态文件（纯静态，直接挂载，改完刷新即可）
      - ./web:/usr/share/nginx/html:ro
      # HTTPS 证书目录（放置 fullchain.pem / privkey.pem）
      - ./deploy/certs:/etc/nginx/certs:ro
