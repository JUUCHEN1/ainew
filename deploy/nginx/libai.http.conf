# ============================================================
# 漫创AI Web · Nginx HTTP 模板（统一入口：前端静态 + 后端 API）
# ------------------------------------------------------------
# 这是“IP / 无证书”阶段用的纯 HTTP 配置。前端 web/ 由 Nginx 直接托管，
# 后端固定前缀反代到回环上的 uvicorn。前后端同源，所以 config.js 用
#   window.__LIBAI_BACKEND_BASE_URL__ = window.location.origin;
# 在 http://IP:端口 和以后的 https://域名 下都自动正确。
#
# 占位符（manage.sh 会用 sed 替换）：
#   __LISTEN__       监听端口（Docker 容器内固定 80；宿主机用自定义端口）
#   __SERVER_NAME__  _ 表示匹配任意 IP/域名
#   __ROOT__         前端 web/ 绝对路径
#   __BACKEND__      后端 upstream，如 backend:8765 或 127.0.0.1:8765
#   __INCLUDE__      公共反代头 include 路径
# ============================================================

server {
    listen __LISTEN__;
    server_name __SERVER_NAME__;

    root __ROOT__;
    index index.html;

    # 上传体积上限（参考图/视频）。按需调大。
    client_max_body_size 200m;

    # certbot webroot 校验目录（以后申请证书时用得到）
    location /.well-known/acme-challenge/ { root __ROOT__; }

    # —— 后端 API 反代（已知固定前缀全部转后端）——
    location ~ ^/(health|jobs|newapi|providers|provider-models|projects|history|prompts|media|jianying|desktop-announcements|design-space)(/|$) {
        proxy_pass http://__BACKEND__;
        include __INCLUDE__;
    }

    # —— /assets 冲突处理：后端的 assets 写/导入/管理接口单独转发 ——
    location = /assets        { proxy_pass http://__BACKEND__; include __INCLUDE__; }
    location = /assets/write  { proxy_pass http://__BACKEND__; include __INCLUDE__; }
    location = /assets/import { proxy_pass http://__BACKEND__; include __INCLUDE__; }
    # /assets/{id}：前端打包文件带扩展名（index-xxx.js），后端 asset_id 无扩展名
    location ~ ^/assets/[^/]+$ {
        if ($uri ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|map)$) { break; }
        proxy_pass http://__BACKEND__;
        include __INCLUDE__;
    }
    location ~ ^/assets/[^/]+/(thumb|delete|promote)$ {
        proxy_pass http://__BACKEND__;
        include __INCLUDE__;
    }

    # —— 前端静态文件（SPA：找不到的路径回退 index.html）——
    location / {
        try_files $uri $uri/ /index.html;
    }
}
