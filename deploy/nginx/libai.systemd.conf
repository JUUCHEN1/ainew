# ============================================================
# 漫创AI Web · Nginx 站点配置（systemd 部署版：Nginx 跑在宿主机）
# ------------------------------------------------------------
# 与 docker 版唯一区别：
#   - proxy_pass 指向 127.0.0.1:8765（后端由 systemd 在宿主机运行）
#   - root 指向项目里的 web/ 实际绝对路径
#   - include 路径改为本文件同目录
# 安装：
#   sudo cp deploy/nginx/libai.systemd.conf /etc/nginx/sites-available/libai.conf
#   sudo cp deploy/nginx/_libai_proxy.host.inc /etc/nginx/snippets/_libai_proxy.inc
#   sudo ln -s /etc/nginx/sites-available/libai.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream libai_backend {
    server 127.0.0.1:8765;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 改成你的项目 web/ 绝对路径
    root /opt/libai-canvas-web/web;
    index index.html;

    client_max_body_size 200m;

    location ~ ^/(health|jobs|newapi|providers|provider-models|projects|history|prompts|media|jianying|desktop-announcements|design-space)(/|$) {
        proxy_pass http://libai_backend;
        include /etc/nginx/snippets/_libai_proxy.inc;
    }

    location = /assets        { proxy_pass http://libai_backend; include /etc/nginx/snippets/_libai_proxy.inc; }
    location = /assets/write  { proxy_pass http://libai_backend; include /etc/nginx/snippets/_libai_proxy.inc; }
    location = /assets/import { proxy_pass http://libai_backend; include /etc/nginx/snippets/_libai_proxy.inc; }
    location ~ ^/assets/[^/]+$ {
        if ($uri ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|map)$) { break; }
        proxy_pass http://libai_backend;
        include /etc/nginx/snippets/_libai_proxy.inc;
    }
    location ~ ^/assets/[^/]+/(thumb|delete|promote)$ {
        proxy_pass http://libai_backend;
        include /etc/nginx/snippets/_libai_proxy.inc;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
