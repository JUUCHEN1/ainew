# ============================================================
# 漫创AI Web · Nginx 站点配置（同域反代：前端静态 + 后端 API + HTTPS）
# ------------------------------------------------------------
# 前端 web/ 由 Nginx 直接托管；后端固定 API 前缀反代到 backend:8765。
# 前端 config.js 需设为：window.__LIBAI_BACKEND_BASE_URL__ = location.origin;
#
# 注意 /assets 冲突：前端打包产物在 /assets/*.js|css|png（带扩展名），
# 后端也有 /assets API。下面用精确 location 把后端的 /assets 写操作类接口
# 单独转发，其余 /assets/ 静态文件交给前端。
# ============================================================

# ---- HTTP：80 端口，强制跳转 HTTPS（没有证书时可临时直接用这段服务）----
server {
    listen 80;
    server_name your-domain.com;

    # 申请 Let's Encrypt 证书时的校验目录（certbot webroot）
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # 有证书后开启这行强制跳转 HTTPS；调试 HTTP 时先注释掉
    return 301 https://$host$request_uri;
}

# ---- HTTPS：443 主入口 ----
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # 上传体积上限（参考图/视频）。按需调大。
    client_max_body_size 200m;

    # —— 后端 API 反代（已知固定前缀全部转 backend）——
    location ~ ^/(health|jobs|newapi|providers|provider-models|projects|history|prompts|media|jianying|desktop-announcements|design-space)(/|$) {
        proxy_pass http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / WebSocket（/jobs/events 等长连接）
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # —— /assets 冲突处理：后端的 assets 写/导入/管理接口单独转发 ——
    # 后端固定接口：/assets（GET 列表）、/assets/write、/assets/import、
    # /assets/{id}、/assets/{id}/thumb、/assets/{id}/delete、/assets/{id}/promote
    location = /assets            { proxy_pass http://backend:8765; include /etc/nginx/conf.d/_libai_proxy.inc; }
    location = /assets/write      { proxy_pass http://backend:8765; include /etc/nginx/conf.d/_libai_proxy.inc; }
    location = /assets/import     { proxy_pass http://backend:8765; include /etc/nginx/conf.d/_libai_proxy.inc; }
    # /assets/{id} 及其子路径：前端静态产物文件名形如 index-XXXX.js（含连字符+扩展名），
    # 后端 asset_id 是无扩展名的纯 id。用扩展名区分：带扩展名走静态，其余转后端。
    location ~ ^/assets/[^/]+$ {
        # 带常见静态扩展名 → 前端打包文件
        if ($uri ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|map)$) {
            break;
        }
        proxy_pass http://backend:8765;
        include /etc/nginx/conf.d/_libai_proxy.inc;
    }
    location ~ ^/assets/[^/]+/(thumb|delete|promote)$ {
        proxy_pass http://backend:8765;
        include /etc/nginx/conf.d/_libai_proxy.inc;
    }

    # —— 前端静态文件（SPA：找不到的路径回退 index.html）——
    location / {
        try_files $uri $uri/ /index.html;
    }
}
